version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"

  - package-ecosystem: "pip"
    directory: "/"
    cooldown:
      default-days: 30
    schedule:
      interval: "monthly"
    groups:
      python-app-dependencies:
        dependency-type: "production"
        group-by: dependency-name
      python-dev-dependencies:
        dependency-type: "development"

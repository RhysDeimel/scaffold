name: Check version label

on:
  pull_request:
    types: [labeled, unlabeled, opened, reopened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # This job name is the required status check — add "version/label" to
    # your branch protection rules under Settings > Branches > Required checks.
    name: version/label
    runs-on: ubuntu-latest

    steps:
      - name: Validate exactly one bump label
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          count=$(echo "$LABELS" | jq '[.[] | select(startswith("bump:"))] | length')

          if [ "$count" -eq 0 ]; then
            echo "::error::No bump:* label applied. Apply one of: bump:major, bump:minor, bump:patch, bump:none"
            exit 1
          elif [ "$count" -gt 1 ]; then
            echo "::error::Multiple bump:* labels found — only one is allowed."
            exit 1
          fi

          label=$(echo "$LABELS" | jq -r '.[] | select(startswith("bump:"))')
          echo "Version label: $label"

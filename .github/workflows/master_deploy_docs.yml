name: Deploy Docs

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        run: |
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master || {
            echo "::error::Tag is not on master — skipping docs deploy"
            exit 1
          }

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13

      - name: Install requirements
        run: pip install . --group docs

      - name: Deploy docs to branch
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION_NO_PATCH=$(echo "${TAG#v}" | cut -d'.' -f1-2)
          git fetch origin gh-pages --depth=1
          mike set-default latest --allow-undefined
          mike deploy --push --update-aliases "$VERSION_NO_PATCH" latest
